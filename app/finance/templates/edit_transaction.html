<!DOCTYPE html>
<html>
<head>
    <title>Edit Transaction</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="form-container">

    <h1>Edit Transaction</h1>

    <form method="POST">

        <label>Type</label>
        <select name="type">
            <option value="income" {% if transaction.type == 'income' %}selected{% endif %}>Income</option>
            <option value="expense" {% if transaction.type == 'expense' %}selected{% endif %}>Expense</option>
        </select>

        <label>Category</label>
        <input type="text" name="category" value="{{ transaction.category }}">

        <label>Amount</label>
        <input type="number" name="amount" value="{{ transaction.amount }}">

        <button type="submit">Update Transaction</button>

    </form>

</div>

</body>
</html>
